<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Care — The Plant Truck</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --green-dark: #1a3a28; --green-mid: #2d5a3d; --cream: #f9f6f0; --white: #ffffff; --radius: 12px; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); padding: 40px 20px; }
        .form-shell { max-width: 650px; margin: 0 auto; }
        .form-header { text-align: center; margin-bottom: 30px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--green-dark); }
        .card { background: var(--white); border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--green-mid); margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: var(--radius); font-size: 16px; margin-bottom: 20px; }
        .btn-submit { width: 100%; background: var(--green-dark); color: white; border: none; padding: 18px; border-radius: var(--radius); font-size: 18px; font-weight: 700; cursor: pointer; }
        #successMessage { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="form-shell">
    <div id="formContent">
        <div class="form-header">
            <span class="logo-text">The Plant Truck</span>
            <h1 style="font-family: 'Playfair Display', serif; font-size: 36px;">Customer Care</h1>
        </div>

        <form id="careForm" action="https://formspree.io/f/xzdjakwe" method="POST" enctype="multipart/form-data">
            <div class="card">
                <label>Business Name</label>
                <input type="text" name="Business_Name" required>
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <div class="card">
                <label>Photos (Max 10MB)</label>
                <input type="file" name="Photos" multiple accept="image/*">
                <label>Description</label>
                <textarea name="Message" required style="min-height: 100px;"></textarea>
            </div>
            <button type="submit" id="submitBtn" class="btn-submit">Submit Claim</button>
        </form>
    </div>

    <div id="successMessage" class="card">
        <div style="font-size: 50px;">🌿</div>
        <h2 style="font-family: 'Playfair Display', serif; color: var(--green-dark);">Report Received</h2>
        <p>Thank you. We have received your photos and will be in touch shortly.</p>
    </div>
</div>

<script>
    const form = document.getElementById('careForm');
    form.onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Sending...";

        const response = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        } else {
            alert("Oops! There was a problem. Please email sales@planttruck.com");
            btn.disabled = false;
            btn.innerText = "Submit Claim";
        }
    };
</script>
</body>
</html>
