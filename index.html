<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>Customer Care — The Plant Truck</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --green-dark: #1a3a28; --green-mid: #2d5a3d; --cream: #f9f6f0;
            --gold: #c8a96e; --text-dark: #1a2a1e; --white: #ffffff;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); padding: 40px 20px; }
        .form-shell { max-width: 650px; margin: 0 auto; }
        .form-header { text-align: center; margin-bottom: 30px; }
        .logo-text { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--green-dark); margin-bottom: 10px; display: block; }
        .form-header h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--green-dark); }
        .card { background: var(--white); border-radius: 16px; padding: 30px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--green-mid); margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; margin-bottom: 20px; }
        .btn-submit { width: 100%; background: var(--green-dark); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-shell">
    <div class="form-header">
        <span class="logo-text">The Plant Truck</span>
        <h1>Customer Care</h1>
    </div>

    <form action="https://formspree.io/f/xzdjakwe" method="POST" enctype="multipart/form-data">
        <div class="card">
            <label>Business Name</label>
            <input type="text" name="Business Name" required>
            
            <label>Contact Name</label>
            <input type="text" name="Contact Name" required>

            <label>Email Address</label>
            <input type="email" name="_replyto" required>

            <label>Delivery Date</label>
            <input type="date" name="Delivery Date" required>
        </div>

        <div class="card">
            <label>Reason</label>
            <select name="Reason" required>
                <option value="">Select...</option>
                <option>Damaged Plants</option>
                <option>Missing Items</option>
                <option>Quality Concern</option>
            </select>

            <label>Description</label>
            <textarea name="Message" required style="min-height: 120px;"></textarea>

            <label>Photos (Select multiple)</label>
            <input type="file" name="Photos" multiple accept="image/*">
        </div>

        <input type="hidden" name="_next" value="https://planttruck.github.io/customer-care/">
        
        <button type="submit" class="btn-submit">Submit Claim</button>
    </form>
</div>

</body>
</html>
